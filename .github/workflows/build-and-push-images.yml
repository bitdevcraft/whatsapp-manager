name: Build And Push Images

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment: Web

    strategy:
      fail-fast: false
      matrix:
        include:
          - context: .
            dockerfile: apps/web/Dockerfile
            image_name: tasweeq-whatsapp-web
            build_args: |
              BASE_URL=${{ vars.BASE_URL }}
              NEXT_PUBLIC_WEB_URL=${{ vars.NEXT_PUBLIC_WEB_URL }}
              NEXT_PUBLIC_WEB_SOCKET=${{ vars.NEXT_PUBLIC_WEB_SOCKET }}
          - context: .
            dockerfile: apps/whatsapp-service/Dockerfile
            image_name: tasweeq-whatsapp-whatsapp-service
            build_args: ""
          - context: .
            dockerfile: packages/db/Dockerfile
            image_name: tasweeq-whatsapp-db
            build_args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare Registry Values
        id: prep
        shell: bash
        run: |
          echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Log In To GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.prep.outputs.owner_lc }}/${{ matrix.image_name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha

      - name: Build And Push Image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          build-args: ${{ matrix.build_args }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
