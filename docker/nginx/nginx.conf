
#user  nobody;
worker_processes 1;

#error_log  logs/error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;

#pid        logs/nginx.pid;
events {
    worker_connections 1024;
}


http {
    include mime.types;
    default_type application/octet-stream;

    #log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
    #                  '$status $body_bytes_sent "$http_referer" '
    #                  '"$http_user_agent" "$http_x_forwarded_for"';

    #access_log  logs/access.log  main;
    sendfile on;
    #tcp_nopush     on;

    #keepalive_timeout  0;
    keepalive_timeout 65;

    client_max_body_size 100M; # make sure this is large enough


    #gzip  on;
    # Catch-all dummy/default (optifonal but handy)
    server {
        listen 443 ssl default_server;
        server_name _;

        ssl_certificate ../certs/dummy.crt;
        ssl_certificate_key ../certs/dummy.key;
        # optional if you created it:
        # ssl_dhparam          certs/dhparam.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        # Simple test response so NGINX can start with SSL
        location / {
            return 200 "OK - dummy SSL is working\r\n";
            add_header Content-Type text/plain;
        }
    }

    # Your real site (replace names, upstream, etc.)
    server {
        listen 443 ssl;
        server_name dev.local localhost;

        ssl_certificate ../certs/dummy.crt;
        ssl_certificate_key ../certs/dummy.key;

        # example reverse proxy:
        location /socket.io/ {
            proxy_pass http://localhost:3000/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # location / {

        #     if ($ssl_client_s_dn ~ "CN=client.webhooks.fbclientcerts.com") {
        #         return 200 "$ssl_client_s_dn";
        #     }
        location /wa-app/ {
            proxy_pass http://localhost:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://localhost:3001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # HTTP → HTTPS redirect (optional)
    server {
        listen 80;
        server_name dev.local localhost _;
        return 301 https://$host$request_uri;
    }


}
